<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Ghost glow/shadow (subtle outer) -->
  <rect x="4" y="1" width="8" height="1" fill="#bbbbee"/>
  <rect x="3" y="2" width="10" height="1" fill="#ccccff"/>
  <!-- Main ghost body -->
  <rect x="2" y="3" width="12" height="8" fill="#ddddf0"/>
  <!-- Top dome -->
  <rect x="4" y="2" width="8" height="2" fill="#ddddf0"/>
  <!-- Bottom wiggly edge -->
  <rect x="2" y="11" width="2" height="3" fill="#ddddf0"/>
  <rect x="6" y="11" width="2" height="3" fill="#ddddf0"/>
  <rect x="10" y="11" width="2" height="3" fill="#ddddf0"/>
  <rect x="14" y="11" width="2" height="3" fill="#ddddf0"/>
  <!-- Inner body tint -->
  <rect x="4" y="4" width="8" height="5" fill="#eeeeff"/>
  <!-- Eyes (dark hollow) -->
  <rect x="4" y="5" width="3" height="4" fill="#222244"/>
  <rect x="5" y="5" width="1" height="1" fill="#4444aa"/>
  <rect x="9" y="5" width="3" height="4" fill="#222244"/>
  <rect x="10" y="5" width="1" height="1" fill="#4444aa"/>
  <!-- Mouth (o shape) -->
  <rect x="7" y="9" width="2" height="2" fill="#333366"/>
</svg>
