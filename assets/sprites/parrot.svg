<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" shape-rendering="crispEdges">
  <!-- Tail feathers -->
  <rect x="0" y="7" width="2" height="5" fill="#22aa44"/>
  <rect x="1" y="9" width="2" height="3" fill="#118833"/>
  <!-- Body -->
  <rect x="2" y="4" width="7" height="6" fill="#22aa44"/>
  <!-- Wing highlight -->
  <rect x="3" y="5" width="4" height="3" fill="#44cc66"/>
  <!-- Head -->
  <rect x="3" y="1" width="6" height="5" fill="#22aa44"/>
  <!-- Forehead crest -->
  <rect x="6" y="0" width="2" height="2" fill="#ff4444"/>
  <!-- Eye -->
  <rect x="7" y="2" width="2" height="2" fill="#ffffff"/>
  <rect x="8" y="2" width="1" height="1" fill="#111111"/>
  <!-- Beak upper -->
  <rect x="8" y="3" width="3" height="1" fill="#ffaa00"/>
  <!-- Beak lower -->
  <rect x="9" y="4" width="2" height="1" fill="#ff8800"/>
  <!-- Feet -->
  <rect x="4" y="10" width="1" height="2" fill="#ffaa00"/>
  <rect x="3" y="11" width="3" height="1" fill="#ffaa00"/>
  <rect x="7" y="10" width="1" height="2" fill="#ffaa00"/>
  <rect x="6" y="11" width="3" height="1" fill="#ffaa00"/>
</svg>
