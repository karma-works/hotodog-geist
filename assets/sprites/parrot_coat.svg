<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" shape-rendering="crispEdges">
  <!-- Gigantic police coat -->
  <!-- Body (drags on floor) -->
  <rect x="4" y="0" width="24" height="40" fill="#2255cc"/>
  <!-- Lapels -->
  <rect x="4" y="0" width="6" height="12" fill="#1a4aaa"/>
  <rect x="22" y="0" width="6" height="12" fill="#1a4aaa"/>
  <!-- Collar -->
  <rect x="8" y="0" width="16" height="4" fill="#1a3a6a"/>
  <!-- Buttons -->
  <rect x="15" y="8"  width="2" height="2" fill="#ffd700"/>
  <rect x="15" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="15" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="15" y="26" width="2" height="2" fill="#ffd700"/>
  <!-- Sleeves (way too long, hanging off) -->
  <rect x="0"  y="6" width="4" height="24" fill="#2255cc"/>
  <rect x="28" y="6" width="4" height="24" fill="#2255cc"/>
  <!-- Sleeve cuffs -->
  <rect x="0"  y="28" width="4" height="4" fill="#ffd700"/>
  <rect x="28" y="28" width="4" height="4" fill="#ffd700"/>
  <!-- Hem dragging on floor -->
  <rect x="4" y="37" width="24" height="3" fill="#1a3a6a"/>
</svg>
