  <rect x="436" y="70"  width="10"  height="12" fill="#1a1a2e"/>
  <rect x="452" y="70"  width="10"  height="12" fill="#1a1a2e"/>
  <rect x="100" y="100" width="10"  height="12" fill="#1a1a2e"/>
  <rect x="116" y="100" width="10"  height="12" fill="#1a1a2e"/>
  <rect x="132" y="100" width="10"  height="12" fill="#1a1a2e"/>
