  <rect x="120" y="252" width="1" height="18" fill="#222233"/>
  <rect x="160" y="252" width="1" height="18" fill="#222233"/>
  <rect x="200" y="252" width="1" height="18" fill="#222233"/>
  <rect x="240" y="252" width="1" height="18" fill="#222233"/>
  <rect x="280" y="252" width="1" height="18" fill="#222233"/>
  <rect x="320" y="252" width="1" height="18" fill="#222233"/>
  <rect x="360" y="252" width="1" height="18" fill="#222233"/>
  <rect x="400" y="252" width="1" height="18" fill="#222233"/>
  <rect x="440" y="252" width="1" height="18" fill="#222233"/>
