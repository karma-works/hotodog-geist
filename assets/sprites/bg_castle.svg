  <rect x="210" y="22" width="1" height="1" fill="#ddddff"/>
  <rect x="250" y="12" width="2" height="2" fill="#ffffff"/>
  <rect x="300" y="6"  width="1" height="1" fill="#ddddff"/>
  <rect x="340" y="20" width="2" height="2" fill="#ffffff"/>
