  <rect x="20"  y="95"  width="6"  height="10" fill="#ff8800" opacity="0.4"/>
  <rect x="430" y="95"  width="10" height="14" fill="#332200"/>
  <rect x="432" y="95"  width="6"  height="10" fill="#ff8800" opacity="0.4"/>
  <rect x="125" y="125" width="10" height="14" fill="#332200"/>
  <rect x="127" y="125" width="6"  height="10" fill="#aa6600" opacity="0.5"/>
  <rect x="145" y="125" width="10" height="14" fill="#332200"/>
