<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 100" width="960" height="100" shape-rendering="crispEdges">
  <!-- Asphalt — fully opaque, no alpha -->
  <rect width="960" height="100" fill="#2c2c2c"/>

  <!-- Left kerb -->
  <rect x="0"   y="0" width="20" height="100" fill="#3a3a3a"/>
  <rect x="20"  y="0" width="4"  height="100" fill="#e8e8e8"/>

  <!-- Right kerb -->
  <rect x="936" y="0" width="4"  height="100" fill="#e8e8e8"/>
  <rect x="940" y="0" width="20" height="100" fill="#3a3a3a"/>

  <!-- Lane dash at x=240: 60 px on, 40 px off (within the 100 px tile) -->
  <rect x="238" y="0"  width="4" height="60" fill="#e8e8e8"/>

  <!-- Lane dash at x=480 -->
  <rect x="478" y="0"  width="4" height="60" fill="#e8e8e8"/>

  <!-- Lane dash at x=720 -->
  <rect x="718" y="0"  width="4" height="60" fill="#e8e8e8"/>
</svg>
