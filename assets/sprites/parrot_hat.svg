<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 20" shape-rendering="crispEdges">
  <!-- Enormous police hat - comically oversized -->
  <!-- Brim (very wide) -->
  <rect x="0" y="14" width="32" height="4" fill="#2255aa"/>
  <rect x="0" y="14" width="32" height="1" fill="#3366cc"/>
  <!-- Crown (tall) -->
  <rect x="4" y="0" width="24" height="15" fill="#1a3a6a"/>
  <!-- Crown highlight -->
  <rect x="4" y="0" width="24" height="2" fill="#2255aa"/>
  <!-- Gold band -->
  <rect x="4" y="12" width="24" height="2" fill="#ffd700"/>
  <!-- Badge -->
  <rect x="13" y="4" width="6" height="6" fill="#ffd700"/>
  <rect x="14" y="5" width="4" height="4" fill="#1a3a6a"/>
  <rect x="15" y="4" width="2" height="6" fill="#ffd700"/>
  <rect x="13" y="6" width="6" height="2" fill="#ffd700"/>
  <!-- Parrot sitting on top (tiny) -->
  <rect x="14" y="0" width="4" height="3" fill="#22aa44"/>
  <rect x="17" y="0" width="2" height="1" fill="#ffaa00"/>
</svg>
